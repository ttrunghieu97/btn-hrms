# ============================================
# BTN HRMS — Infra services (Postgres + MinIO)
# ============================================
# Contains only postgres and minio services.
# Bring up with: docker compose -f docker-compose.infra.yml up -d

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

x-pids: &pids
  pids_limit: 200

x-mem-2g: &mem-2g
  mem_limit: 2g
  mem_reservation: 1400m

x-mem-768m: &mem-768m
  mem_limit: 768m
  mem_reservation: 540m

x-mem-64m: &mem-64m
  mem_limit: 64m
  mem_reservation: 45m

networks:
  btn-hrms-network:
    name: btn-hrms-network
    driver: bridge

volumes:
  postgres_data:
  minio_data:

services:
  # ============================================
  # Postgres — primary OLTP store
  # ============================================
  postgres:
    image: postgres:16.4-bookworm
    container_name: btn-hrms-postgres
    restart: unless-stopped
    stop_grace_period: 60s
    user: "999:999"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    <<: [*mem-2g, *pids, *logging]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hrms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-hrms}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "log_min_duration_statement=500ms"
    cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hrms} -d ${POSTGRES_DB:-hrms}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - btn-hrms-network

  # ============================================
  # MinIO — Local S3 storage provider
  # ============================================
  minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    container_name: btn-hrms-minio
    restart: unless-stopped
    <<: [*mem-768m, *pids, *logging]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - btn-hrms-network

  # ============================================
  # MinIO CLI Init — Auto creates bucket
  # ============================================
  minio-init:
    image: minio/mc:RELEASE.2024-07-31T15-58-33Z
    container_name: btn-hrms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    <<: [*mem-64m, *pids, *logging]
    security_opt:
      - no-new-privileges:true
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required};
      mc mb --ignore-existing local/btn-hrms;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - btn-hrms-network

  # ============================================
  # Redis — Cache & Event bus
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: btn-hrms-redis
    restart: unless-stopped
    <<: [*mem-64m, *pids, *logging]
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - btn-hrms-network
