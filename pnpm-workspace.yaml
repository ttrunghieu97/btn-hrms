packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@scarf/scarf': true
  '@sentry/cli': true
  '@swc/core': true
  bcrypt: true
  esbuild: true
  msw: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@scarf/scarf'
  - '@sentry/cli'
  - '@swc/core'
  - bcrypt
  - esbuild
  - msw
  - msgpackr-extract
  - protobufjs
  - sharp
  - unrs-resolver
